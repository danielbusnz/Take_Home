<!doctype html><meta charset=utf-8>
<title>Policy Puller, Claude transcripts</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body{margin:0;font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;background:#faf9f7;color:#1a1a1a}
  header{display:flex;gap:.7rem;align-items:center;flex-wrap:wrap;padding:.7rem 1rem;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:2}
  header b{font-size:.95rem;white-space:nowrap}
  select{font:inherit;padding:.45rem .6rem;border:1px solid #ccc;border-radius:8px;background:#fff;flex:1;min-width:240px;max-width:560px}
  a.open{font-size:.85rem;color:#1a4fa0;text-decoration:none;white-space:nowrap}
  iframe{display:block;width:100%;height:calc(100vh - 58px);border:0;background:#fff}
</style>
<header>
  <b>Claude transcripts</b>
  <select id="pick" aria-label="Choose a transcript"></select>
  <a class="open" id="raw" target="_blank" rel="noopener">open in new tab &raquo;</a>
</header>
<iframe id="view" title="transcript"></iframe>
<script>
  const files = [
    ["1. Brainstorming session", "export-1-brainstorming-session.html"],
    ["2. Project onboarding", "export-2-project-onboarding.html"],
    ["3. Allstate login spike", "export-3-allstate-login-spike.html"],
    ["4. First browser automation", "export-4-first-browser-automation.html"],
    ["5. Code and architecture review", "export-5-code-architecture-review.html"],
    ["6. Chaos and QA hardening", "export-6-chaos-qa-hardening.html"],
    ["7. Allstate full API fetch", "export-7-allstate-full-api.html"],
    ["8. Geico carrier and latency", "export-8-geico-carrier-latency.html"],
  ];
  const sel = document.getElementById("pick");
  const view = document.getElementById("view");
  const raw = document.getElementById("raw");
  for (const [label, file] of files) {
    const o = document.createElement("option");
    o.value = file; o.textContent = label;
    sel.appendChild(o);
  }
  function load() { view.src = sel.value; raw.href = sel.value; }
  sel.addEventListener("change", load);
  load();
</script>
