<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Policy Puller</title>
  </head>
  <body>
    <h1>Policy Puller</h1>

    <!-- STATE: login form -->
    <section id="form-section">
      <label for="carrier">Carrier</label>
      <select id="carrier"></select>

      <label for="username">Username</label>
      <input id="username" />

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="off" />

      <button id="login-btn">Get my documents</button>
    </section>

    <!-- STATE: MFA prompt (hidden until the carrier asks for it) -->
    <section id="mfa-section" hidden inert>
      <label for="code">MFA code</label>
      <input id="code" inputmode="numeric" />
      <button id="mfa-btn">Submit code</button>
    </section>

    <!-- STATE: results -->
    <section id="docs-section" hidden inert></section>

    <!-- always-on status line -->
    <p id="status" role="status"></p>

    <script type="module">
      const $ = (id) => document.getElementById(id);
      let warmId = null;
      let preparing = null; // in-flight /prepare; login() awaits it so it never cold-starts

      // Fill the carrier dropdown from the backend, then pre-warm the default
      // carrier the instant the page loads, so the cloud browser is already opening
      // before the user types (a fast submit into a cold session is ~23s; see
      // latency.md).
      async function loadCarriers() {
        try {
          const { carriers } = await (await fetch("/carriers")).json();
          $("carrier").innerHTML = carriers
            .map((c) => `<option value="${c}">${c}</option>`)
            .join("");
          prepare(); // fire the pre-warm on load for the default carrier
        } catch {
          $("status").textContent = "Could not load carriers. Is the server running?";
        }
      }

      // Speculative pre-warm: open the browser + login page in the background so
      // login is fast on submit. Kicked off on page load AND on carrier change.
      // prepare() is slow (~11s: Allstate's SPA hydrates), so we keep the in-flight
      // promise in `preparing` and have login() await it — otherwise a user who
      // submits before prepare returns sends warmId:null and /login cold-starts a
      // SECOND full prepare (~22s). Awaiting guarantees the warm session is reused.
      function prepare() {
        warmId = null;
        const carrier = $("carrier").value;
        if (!carrier) {
          preparing = null;
          return;
        }
        // surface the warm-up so the user has a reason not to submit into a cold
        // session; cleared to "Ready" once the session is warm.
        show("Preparing a secure session...");
        preparing = (async () => {
          try {
            const res = await fetch("/prepare", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({ carrier }),
            });
            const data = await res.json();
            if (res.ok) {
              warmId = data.warmId;
              show("Ready. Enter your credentials.");
            }
          } catch {
            /* pre-warm is best-effort; login still works (just slower) without it */
          }
        })();
      }

      $("carrier").addEventListener("change", prepare);

      const show = (msg) => ($("status").textContent = msg);
      let sessionId = null;
      let submitAt = 0; // login-button click
      let mfaAt = 0; // MFA-submit click (the graded "MFA -> docs" start)
      let blobUrls = []; // object URLs from the last render, revoked on the next

      // POST and handle the response, which is either a single JSON object (mfa_needed,
      // done, or an error) or an NDJSON stream of {type:doc}/{type:done} so each PDF can
      // paint the moment its bytes arrive. Returns a small tagged result for the caller.
      async function submitTo(path, body) {
        let res;
        try {
          res = await fetch(path, {
            method: "POST",
            headers: { "content-type": "application/json", accept: "application/x-ndjson" },
            body: JSON.stringify(body),
          });
        } catch {
          return { kind: "error", error: "could not reach the server" };
        }
        const ct = res.headers.get("content-type") || "";
        if (!ct.includes("application/x-ndjson")) {
          // single JSON: mfa_needed, done (e.g. the reuse path), or an error status
          const data = await res.json().catch(() => ({ error: "bad response" }));
          if (!res.ok) return { kind: "error", error: data.error || "request failed" };
          if (data.status === "mfa_needed") return { kind: "mfa", sessionId: data.sessionId };
          return { kind: "done", documents: data.documents || [], gradedMs: data.gradedMs };
        }
        // NDJSON: render each document the moment its line arrives
        clearDocs();
        let rendered = 0, gradedMs = null, firstAt = null, fallback = [];
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        for (;;) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          let nl;
          while ((nl = buf.indexOf("\n")) >= 0) {
            const line = buf.slice(0, nl).trim();
            buf = buf.slice(nl + 1);
            if (!line) continue;
            let msg;
            try { msg = JSON.parse(line); } catch { continue; }
            if (msg.type === "doc") {
              if (firstAt === null) firstAt = performance.now();
              renderOne(msg.document);
              show(`rendering documents... (${++rendered})`);
            } else if (msg.type === "done") {
              gradedMs = msg.gradedMs;
              fallback = msg.documents || [];
            } else if (msg.type === "error") {
              return { kind: "error", error: msg.error || "document fetch failed" };
            }
          }
        }
        // carriers that did not stream (no doc lines): render the full set from done
        if (rendered === 0) fallback.forEach(renderOne);
        return { kind: "streamed", gradedMs, firstAt };
      }

      async function login() {
        $("login-btn").disabled = true;
        submitAt = performance.now();
        // wait for any in-flight pre-warm so /login reuses the warm session instead of
        // cold-starting a second prepare.
        if (preparing) {
          show("Preparing session...");
          await preparing;
        }
        show("Logging in...");
        const r = await submitTo("/login", {
          carrier: $("carrier").value,
          username: $("username").value.trim(),
          password: $("password").value,
          warmId,
        });
        if (r.kind === "error") {
          $("login-btn").disabled = false;
          return show("Error: " + r.error);
        }
        if (r.kind === "mfa") {
          sessionId = r.sessionId;
          const mfa = $("mfa-section");
          mfa.hidden = false;
          mfa.removeAttribute("inert");
          $("code").focus();
          return show("Enter the code we sent you");
        }
        finish(r);
      }

      async function submitMfa() {
        $("mfa-btn").disabled = true;
        mfaAt = performance.now(); // graded clock: MFA submit -> documents
        show("Verifying...");
        const r = await submitTo("/mfa", { sessionId, code: $("code").value.trim() });
        if (r.kind === "error") {
          $("mfa-btn").disabled = false;
          return show("Error: " + r.error);
        }
        finish(r);
      }

      function finish(r) {
        // streamed: PDFs already painted as they arrived. done (reuse): render now.
        if (r.kind === "done") render(r.documents);
        const start = mfaAt || submitAt;
        const label = mfaAt ? "MFA submit" : "login";
        const full = (performance.now() - submitAt) / 1000;
        if (r.kind === "streamed" && r.firstAt) {
          // streaming win: the first PDF (the brief's "document on screen") lands before
          // the slowest one finishes. Show time to first, and time to all.
          const first = (r.firstAt - start) / 1000;
          const all = (performance.now() - start) / 1000;
          show(`done. first PDF on screen ${first.toFixed(1)}s | all ${all.toFixed(1)}s | full login-click ${full.toFixed(1)}s`);
        } else {
          // JSON done (reuse) or no firstAt: show the server-measured fetch span.
          const g = typeof r.gradedMs === "number" ? `${(r.gradedMs / 1000).toFixed(1)}s` : "n/a";
          show(`done. ${label} -> documents ${g} (graded span) | full login-click -> on screen ${full.toFixed(1)}s`);
        }
        mfaAt = 0; // reset for the next run
        $("login-btn").disabled = false; // allow another run without a page reload
      }

      // reset the document area for a fresh render, releasing old blob URLs
      function clearDocs() {
        blobUrls.forEach((u) => URL.revokeObjectURL(u));
        blobUrls = [];
        const out = $("docs-section");
        out.hidden = false;
        out.removeAttribute("inert");
        out.innerHTML = "";
      }

      // append one document's preview + download link
      function renderOne(d) {
        const bytes = Uint8Array.from(atob(d.bytes), (c) => c.charCodeAt(0));
        const url = URL.createObjectURL(new Blob([bytes], { type: d.contentType }));
        blobUrls.push(url);
        const kb = Math.round(bytes.length / 1024);
        const fname = d.name.toLowerCase().endsWith(".pdf") ? d.name : `${d.name}.pdf`;
        const div = document.createElement("div");
        div.innerHTML = `<p>${d.name} (${d.contentType}, ${kb} KB) <a href="${url}" download="${fname}">download</a></p>
          <iframe src="${url}" width="100%" height="480"></iframe>`;
        $("docs-section").appendChild(div);
      }

      function render(documents) {
        clearDocs();
        documents.forEach(renderOne);
      }

      $("login-btn").addEventListener("click", login);
      $("mfa-btn").addEventListener("click", submitMfa);

      loadCarriers();
    </script>
  </body>
</html>
