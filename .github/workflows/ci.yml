name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      # runs the pure helpers + the mock-driven endpoint suite. Real carriers
      # need Browserbase creds + live portals, so they are verified manually.
      - run: npm test
